name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.APP_DIR }}"
            export REPO_URL="https://github.com/Mango-UofA/skykoi.git"
            export BACKEND_ENV=$(cat <<'EOF'
            ${{ secrets.BACKEND_ENV }}
            EOF
            )
            export FRONTEND_ENV_PRODUCTION=$(cat <<'EOF'
            ${{ secrets.FRONTEND_ENV_PRODUCTION }}
            EOF
            )
            bash -lc "cd ${APP_DIR} 2>/dev/null || true; if [ ! -f /var/www/skykoi/app/deploy/scripts/deploy.sh ]; then mkdir -p /var/www/skykoi; fi"
            if [ ! -d /var/www/skykoi/app/.git ]; then
              rm -rf /var/www/skykoi/app
              git clone "$REPO_URL" /var/www/skykoi/app
            fi
            bash /var/www/skykoi/app/deploy/scripts/deploy.sh
